{{ $id := printf "compare-%d" (index (seq 1 999 | shuffle) 0) }}
{{ $img1 := .Get "before" }}
{{ $img2 := .Get "after" }}
{{ $alt1 := .Get "alt1" | default "Before" }}
{{ $alt2 := .Get "alt2" | default "After" }}

<div class="image-compare" id="{{ $id }}" style="position:relative; overflow:hidden; max-width:100%; user-select:none; touch-action:none;">
  <img src="{{ site.Params.imageBaseURL }}{{ $img2 }}" alt="{{ $alt2 }}" style="display:block; width:100%; height:auto; margin:0;" loading="lazy" decoding="async">
  <div class="compare-before" style="position:absolute; top:0; left:0; width:100%; height:100%; clip-path:inset(0 50% 0 0); pointer-events:none;">
    <img src="{{ site.Params.imageBaseURL }}{{ $img1 }}" alt="{{ $alt1 }}" style="display:block; width:100%; height:100%; object-fit:cover; margin:0;" loading="lazy" decoding="async">
  </div>
  <div class="compare-divider" style="position:absolute; top:0; left:50%; width:3px; height:100%; background:white; cursor:ew-resize; box-shadow:0 0 4px rgba(0,0,0,0.5);">
    <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:32px; height:32px; background:white; border-radius:50%; box-shadow:0 0 4px rgba(0,0,0,0.4); display:flex; align-items:center; justify-content:center;">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 3l5 5-5 5M6 3L1 8l5 5" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
  </div>
</div>

<script>
(function() {
  const container = document.getElementById('{{ $id }}');
  const before = container.querySelector('.compare-before');
  const divider = container.querySelector('.compare-divider');
  let active = false;

  function move(x) {
    const rect = container.getBoundingClientRect();
    let pos = (x - rect.left) / rect.width;
    pos = Math.max(0, Math.min(1, pos));
    before.style.clipPath = 'inset(0 ' + ((1 - pos) * 100) + '% 0 0)';
    divider.style.left = (pos * 100) + '%';
  }

  container.addEventListener('mousedown', (e) => { active = true; move(e.clientX); });
  window.addEventListener('mousemove', (e) => { if (active) move(e.clientX); });
  window.addEventListener('mouseup', () => { active = false; });

  container.addEventListener('touchstart', (e) => { active = true; move(e.touches[0].clientX); });
  window.addEventListener('touchmove', (e) => { if (active) move(e.touches[0].clientX); });
  window.addEventListener('touchend', () => { active = false; });
})();
</script>
